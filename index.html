<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéDex Collection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2e;
    --border: #2a2a45;
    --text: #e8e8f0;
    --muted: #7878a0;
    --accent: #f5a623;
    --accent2: #e8b4f8;
    --red: #ff4757;
    --green: #2ed573;
    --blue: #5352ed;
    --card-w: 63mm;
    --card-h: 88mm;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(245,166,35,0.5);
    letter-spacing: 1px;
  }

  .logo span { color: var(--accent2); }

  .stats-bar {
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .progress-bar {
    width: 200px;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .progress-pct {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent2);
  }

  /* MAIN LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 64px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-section {
    padding: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* Responsive */
  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { max-height: 50vh; }
    .stats-bar { display: none; }
    .logo { font-size: 10px; }
    .progress-bar { width: 120px; }
  }

  /* ── POPUP ENCODAGE ── */
  .encode-popup-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .encode-popup-bg.open { opacity: 1; pointer-events: all; }

  .encode-popup {
    background: var(--surface);
    border-radius: 20px;
    padding: 2rem 2rem 1.5rem;
    width: 340px;
    max-width: 92vw;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.2s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }
  .encode-popup-bg.open .encode-popup { transform: scale(1); }
  .encode-popup.already { border: 2px solid #818cf8; }
  .encode-popup.new-card { border: 2px solid var(--green); }

  .ep-emoji { font-size: 3rem; margin-bottom: 0.4rem; line-height: 1; }
  .ep-title { font-family: 'Press Start 2P', monospace; font-size: 10px; line-height: 1.8; margin-bottom: 0.4rem; }
  .ep-title.already { color: #818cf8; }
  .ep-title.new-card { color: var(--green); }
  .ep-num { font-size: 3rem; font-weight: 800; margin: 0.5rem 0; line-height: 1; }
  .ep-num.already { color: #818cf8; }
  .ep-num.new-card { color: var(--green); }
  .ep-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }
  .ep-actions { display: flex; flex-direction: column; gap: 0.55rem; }

  .btn.purple { background: rgba(129,140,248,0.15); color: #818cf8; border-color: #818cf8; }
  .btn.purple:hover { background: rgba(129,140,248,0.3); }

  .confetti-piece {
    position: fixed; width: 9px; height: 9px; border-radius: 2px;
    pointer-events: none; z-index: 500;
    animation: cf-fall 1.1s ease-out forwards;
  }
  @keyframes cf-fall {
    0%   { opacity:1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity:0; transform: translateY(180px) rotate(720deg) scale(0.2); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Poké<span>Dex</span> Tracker</div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="hdr-owned">0</div>
      <div class="stat-label">Possédées</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="hdr-missing">1025</div>
      <div class="stat-label">Manquantes</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </div>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- AJOUT MANUEL -->
    <div class="sidebar-section">
      <div class="section-title">✏️ Saisie manuelle</div>
      <div class="input-row">
        <input type="number" id="manual-num" placeholder="N° carte" min="1" max="1025" />
        <button class="btn success" onclick="toggleManual()">Ajouter/Retirer</button>
      </div>
      <div style="margin-top:0.5rem; font-size:0.75rem; color: var(--muted);">Entrée rapide : appuyez sur Entrée</div>
    </div>

    <!-- ACTIONS GLOBALES -->
    <div class="sidebar-section">
      <div class="section-title">⚙️ Actions</div>
      <div style="display:flex; flex-direction:column; gap:0.5rem;">
        <button class="btn" onclick="exportData()">💾 Exporter JSON</button>
        <button class="btn" onclick="document.getElementById('import-file').click()">📂 Importer JSON</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)"/>
        <button class="btn danger" onclick="confirmReset()">🗑️ Réinitialiser tout</button>
      </div>
    </div>

    <!-- FILTRES -->
    <div class="sidebar-section">
      <div class="section-title">🔍 Filtres</div>
      <input type="text" class="search-input" id="search" placeholder="Rechercher un numéro..." oninput="renderGrid()" style="margin-bottom:0.75rem"/>
      <div class="filter-pills">
        <div class="pill active" onclick="setFilter('all', this)">Toutes</div>
        <div class="pill owned-pill" onclick="setFilter('owned', this)">Possédées</div>
        <div class="pill missing-pill" onclick="setFilter('missing', this)">Manquantes</div>
      </div>
    </div>

    <!-- LÉGENDE -->
    <div class="sidebar-section">
      <div class="section-title">Légende</div>
      <div style="display:flex; flex-direction:column; gap:0.5rem; font-size:0.8rem;">
        <div style="display:flex; align-items:center; gap:0.5rem;"><div style="width:28px;height:20px;background:rgba(46,213,115,0.08);border:1.5px solid var(--green);border-radius:4px;"></div> Possédée</div>
        <div style="display:flex; align-items:center; gap:0.5rem;"><div style="width:28px;height:20px;background:var(--surface2);border:1.5px solid var(--border);border-radius:4px;"></div> Manquante</div>
      </div>
    </div>
  </aside>

  <!-- MAIN GRID -->
  <main class="main-content">
    <div class="grid-controls">
      <div class="grid-title">Affichage : <strong id="grid-count">1025</strong> cartes</div>
      <button class="btn" onclick="renderGrid()">🔄 Rafraîchir</button>
    </div>
    <div class="card-grid" id="card-grid"></div>
  </main>
</div>

<!-- MODAL DÉTAIL CARTE -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h2>Détail carte</h2>
    <div class="modal-card-num" id="modal-num">001</div>
    <div style="text-align:center; color: var(--muted); font-size:0.85rem;" id="modal-status">Statut</div>
    <div class="modal-actions">
      <button class="btn success full" id="modal-toggle-btn" onclick="modalToggle()">Marquer possédée</button>
      <button class="btn full" onclick="closeModalBtn()">Fermer</button>
    </div>
  </div>
</div>

<!-- POPUP ENCODAGE -->
<div class="encode-popup-bg" id="encode-popup-bg">
  <div class="encode-popup" id="encode-popup">
    <div class="ep-emoji" id="ep-emoji">🎉</div>
    <div class="ep-num" id="ep-num">001</div>
    <div class="ep-title" id="ep-title">Nouvelle carte !</div>
    <div class="ep-sub" id="ep-sub"></div>
    <div class="ep-actions" id="ep-actions"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">✅</span>
  <span id="toast-msg">Message</span>
</div>

<script>
// ─── DATABASE (IndexedDB) ─────────────────────────────────────────
const DB_NAME = 'pokecollection';
const DB_VERSION = 1;
let db;
let collection = {}; // { "001": false, "002": true, ... }
let currentFilter = 'all';
let modalCard = null;

function padNum(n) {
  return String(n).padStart(3, '0');
}

// Init collection with all 1025 cards = false
function initCollection() {
  for (let i = 1; i <= 1025; i++) {
    collection[padNum(i)] = false;
  }
}

// Open IndexedDB
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('cards')) {
        db.createObjectStore('cards', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

async function loadFromDB() {
  return new Promise((resolve) => {
    const tx = db.transaction('cards', 'readonly');
    const store = tx.objectStore('cards');
    const req = store.getAll();
    req.onsuccess = () => {
      const rows = req.result;
      if (rows.length > 0) {
        rows.forEach(r => { collection[r.id] = r.owned; });
        resolve(true);
      } else {
        // First time: save all 1025
        saveAllToDB().then(() => resolve(false));
      }
    };
  });
}

async function saveAllToDB() {
  const tx = db.transaction('cards', 'readwrite');
  const store = tx.objectStore('cards');
  for (const [id, owned] of Object.entries(collection)) {
    store.put({ id, owned });
  }
  return new Promise(r => tx.oncomplete = r);
}

async function saveCard(id) {
  return new Promise((resolve) => {
    const tx = db.transaction('cards', 'readwrite');
    const store = tx.objectStore('cards');
    store.put({ id, owned: collection[id] });
    tx.oncomplete = resolve;
  });
}

// ─── STATS ────────────────────────────────────────────────────────
function updateStats() {
  const owned = Object.values(collection).filter(Boolean).length;
  const missing = 1025 - owned;
  const pct = Math.round((owned / 1025) * 100);
  document.getElementById('hdr-owned').textContent = owned;
  document.getElementById('hdr-missing').textContent = missing;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

// ─── GRID RENDER ──────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('card-grid');
  const search = document.getElementById('search').value.trim();
  let cards = Object.entries(collection);

  if (currentFilter === 'owned') cards = cards.filter(([, v]) => v);
  if (currentFilter === 'missing') cards = cards.filter(([, v]) => !v);
  if (search) cards = cards.filter(([k]) => k.includes(search) || k.includes(search.padStart(3,'0')));

  document.getElementById('grid-count').textContent = cards.length;

  grid.innerHTML = '';
  const frag = document.createDocumentFragment();
  cards.forEach(([id, owned]) => {
    const tile = document.createElement('div');
    tile.className = 'card-tile' + (owned ? ' owned' : '');
    tile.dataset.id = id;
    tile.innerHTML = `<div class="card-num">${id}</div>`;
    tile.onclick = () => openModal(id);
    frag.appendChild(tile);
  });
  grid.appendChild(frag);
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

// ─── TOGGLE CARD ──────────────────────────────────────────────────
// ─── TOGGLE CARD (mise à jour tuile uniquement, pas de popup) ────────
async function applyCard(id, owned) {
  collection[id] = owned;
  await saveCard(id);
  updateStats();
  const tile = document.querySelector(`.card-tile[data-id="${id}"]`);
  if (tile) {
    if (owned) {
      tile.classList.add('owned', 'just-found');
      setTimeout(() => tile.classList.remove('just-found'), 700);
    } else {
      tile.classList.remove('owned');
    }
  }
}

// ─── POPUP ENCODAGE ───────────────────────────────────────────────
function openEncodePopup(id) {
  const alreadyOwned = collection[id];
  const bg = document.getElementById('encode-popup-bg');
  const box = document.getElementById('encode-popup');

  document.getElementById('ep-num').textContent = '#' + id;
  document.getElementById('ep-num').className = 'ep-num ' + (alreadyOwned ? 'already' : 'new-card');
  box.className = 'encode-popup ' + (alreadyOwned ? 'already' : 'new-card');

  const actions = document.getElementById('ep-actions');
  actions.innerHTML = '';

  if (alreadyOwned) {
    // Carte déjà possédée → proposer retirer ou annuler
    document.getElementById('ep-emoji').textContent = '⚠️';
    document.getElementById('ep-title').textContent = 'Tu as déjà cette carte !';
    document.getElementById('ep-title').className = 'ep-title already';
    document.getElementById('ep-sub').textContent = 'Elle est déjà dans ta collection. Tu veux la retirer ?';

    const btnRemove = document.createElement('button');
    btnRemove.className = 'btn danger full';
    btnRemove.textContent = '🗑️ Retirer de ma collection';
    btnRemove.onclick = async () => {
      await applyCard(id, false);
      closeEncodePopup();
      showToast('info', '↩️', `Carte #${id} retirée de la collection.`);
    };

    const btnCancel = document.createElement('button');
    btnCancel.className = 'btn full';
    btnCancel.textContent = '✕ Annuler';
    btnCancel.onclick = closeEncodePopup;

    actions.appendChild(btnRemove);
    actions.appendChild(btnCancel);
  } else {
    // Nouvelle carte → l'ajouter directement + confetti
    document.getElementById('ep-emoji').textContent = '🎉';
    document.getElementById('ep-title').textContent = 'Nouvelle carte obtenue !';
    document.getElementById('ep-title').className = 'ep-title new-card';
    document.getElementById('ep-sub').textContent = 'Elle a été ajoutée à ta collection !';

    applyCard(id, true);
    spawnConfetti();

    const btnOk = document.createElement('button');
    btnOk.className = 'btn success full';
    btnOk.textContent = '✓ Super !';
    btnOk.onclick = closeEncodePopup;

    actions.appendChild(btnOk);
  }

  bg.classList.add('open');
}

function closeEncodePopup() {
  document.getElementById('encode-popup-bg').classList.remove('open');
}

document.getElementById('encode-popup-bg').addEventListener('click', (e) => {
  if (e.target.id === 'encode-popup-bg') closeEncodePopup();
});

function spawnConfetti() {
  const colors = ['#f5a623','#2ed573','#5352ed','#e8b4f8','#ff4757','#fff'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.left = (cx + (Math.random() - 0.5) * 220) + 'px';
    el.style.top = (cy - 60 + (Math.random() - 0.5) * 80) + 'px';
    el.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

// ─── MANUAL INPUT ─────────────────────────────────────────────────
function toggleManual() {
  const input = document.getElementById('manual-num');
  const num = parseInt(input.value);
  if (!num || num < 1 || num > 1025) {
    showToast('error', '❌', 'Numéro invalide (1–1025)');
    return;
  }
  const id = padNum(num);
  input.value = '';
  input.focus();
  openEncodePopup(id);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement.id === 'manual-num') {
    toggleManual();
  }
});

// ─── MODAL (clic sur tuile dans la grille) ────────────────────────
function openModal(id) {
  modalCard = id;
  const owned = collection[id];
  const numEl = document.getElementById('modal-num');
  numEl.textContent = '#' + id;
  numEl.className = 'modal-card-num ' + (owned ? 'owned' : 'missing');
  document.getElementById('modal-status').textContent = owned ? '✅ Dans ta collection' : '❌ Carte manquante';
  const btn = document.getElementById('modal-toggle-btn');
  btn.textContent = owned ? '✕ Retirer de la collection' : '✓ Marquer comme possédée';
  btn.className = owned ? 'btn danger full' : 'btn success full';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'modal') closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modal').classList.remove('open');
  modalCard = null;
}

async function modalToggle() {
  if (!modalCard) return;
  const wasOwned = collection[modalCard];
  await applyCard(modalCard, !wasOwned);
  if (!wasOwned) {
    showToast('success', '✅', `Carte #${modalCard} ajoutée !`);
  } else {
    showToast('info', '↩️', `Carte #${modalCard} retirée.`);
  }
  openModal(modalCard);
}

// ─── EXPORT / IMPORT ──────────────────────────────────────────────
function exportData() {
  const owned = Object.entries(collection).filter(([, v]) => v).map(([k]) => k);
  const data = { version: 1, date: new Date().toISOString(), owned, total: owned.length };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pokecollection_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('success', '💾', 'Collection exportée !');
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.owned && Array.isArray(data.owned)) {
      initCollection();
      data.owned.forEach(id => { if (collection.hasOwnProperty(id)) collection[id] = true; });
      await saveAllToDB();
      updateStats();
      renderGrid();
      showToast('success', '📂', `${data.owned.length} cartes importées !`);
    }
  } catch (e) {
    showToast('error', '❌', 'Erreur d\'importation : fichier invalide');
  }
  event.target.value = '';
}

async function confirmReset() {
  if (!confirm('Réinitialiser TOUTE la collection ? Cette action est irréversible.')) return;
  initCollection();
  await saveAllToDB();
  updateStats();
  renderGrid();
  showToast('info', '🗑️', 'Collection réinitialisée.');
}

// ─── TOAST ────────────────────────────────────────────────────────
let toastTimer;
function showToast(type, icon, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 3500);
}

// ─── INIT ────────────────────────────────────────────────────────
async function init() {
  initCollection();
  await openDB();
  await loadFromDB();
  updateStats();
  renderGrid();
}

init();
</script>
</body>
</html>
